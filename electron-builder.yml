appId: com.agegr.pi-web
productName: Pi Agent
copyright: Copyright © 2026 agegr

directories:
  output: release
  buildResources: build

files:
  - package.json
  - electron/dist/**/*
  - "!electron/**/*.ts"
  - "!electron/tsconfig.json"
  - "!node_modules/**/*"

extraResources:
  - from: .next/standalone
    to: standalone
    filter:
      - "**/*"
      - "!node_modules"
  - from: .next/standalone/node_modules
    to: standalone/node_modules
  - from: .next/static
    to: standalone/.next/static
    filter:
      - "**/*"
  - from: public
    to: standalone/public
    filter:
      - "**/*"

asar: false

npmRebuild: true

electronDist: node_modules/electron/dist

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pi Agent
  uninstallDisplayName: Pi Agent
  artifactName: "${productName}-Setup-${version}.${ext}"

publish:
  provider: github
  owner: agegr
  repo: pi-web
